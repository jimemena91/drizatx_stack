services:
  db:
    image: mysql:8.0
    container_name: drizatx-cruzverde-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: drizatx_cruzverde
      MYSQL_USER: driza_cruzverde
      MYSQL_PASSWORD: DrizaCruzVerde_2025
      MYSQL_ROOT_PASSWORD: DrizaRootCruzVerde_2025
    command:
      - --default-authentication-plugin=mysql_native_password
      - --innodb_strict_mode=0
    volumes:
      - drizatx-cruzverde-mysql-data:/var/lib/mysql
    networks:
      - drizatx-cruzverde-network

  backend:
    build:
      context: ./backend
    container_name: drizatx-cruzverde-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_USERNAME: driza_cruzverde
      DATABASE_PASSWORD: DrizaCruzVerde_2025
      DATABASE_NAME: drizatx_cruzverde
      FRONTEND_URLS: https://cruzverde.app.drizatx.com,http://localhost:3220
    ports:
      - "3221:3001"
    networks:
      - drizatx-cruzverde-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "https://cruzverde.api.drizatx.com"
        NEXT_PUBLIC_BASE_URL: "https://cruzverde.app.drizatx.com"
        BACKEND_URL: "http://drizatx-cruzverde-backend:3001"
    container_name: drizatx-cruzverde-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "https://cruzverde.api.drizatx.com"
      NEXT_PUBLIC_BASE_URL: "https://cruzverde.app.drizatx.com"
      BACKEND_URL: "http://drizatx-cruzverde-backend:3001"
    ports:
      - "3220:3000"
    networks:
      - drizatx-cruzverde-network

volumes:
  drizatx-cruzverde-mysql-data:

networks:
  drizatx-cruzverde-network:
    name: drizatx-cruzverde-network
