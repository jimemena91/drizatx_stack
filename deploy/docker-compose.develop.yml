services:
  drizatx-dev-mysql:
    image: mysql:8.0
    container_name: drizatx-dev-mysql
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: DrizaRootPass_2025
      MYSQL_DATABASE: drizatx
      MYSQL_USER: driza
      MYSQL_PASSWORD: DrizaDB_2025
    volumes:
      - drizatx_dev_mysql_data:/var/lib/mysql
    ports:
      - "3311:3306"
    networks:
      - drizatx_dev_net
    restart: unless-stopped

  drizatx-dev-backend:
    image: drizatx_stack-backend
    container_name: drizatx-dev-backend
    environment:
      NODE_ENV: development
      DATABASE_HOST: drizatx-dev-mysql
      DATABASE_PORT: "3306"
      DATABASE_NAME: drizatx
      DATABASE_USERNAME: driza
      DATABASE_PASSWORD: DrizaDB_2025
      JWT_SECRET: "driza-super-secret-2025"
      # Si tu backend usa otras variables (JWT_SECRET, CORS, PRINT_WEBHOOKS, etc.)
      # las agregamos después, pero esto ya levanta la DB.
    depends_on:
      - drizatx-dev-mysql
    ports:
      - "3111:3001"
    networks:
      - drizatx_dev_net
    restart: unless-stopped

networks:
  drizatx_dev_net:
    name: drizatx_dev_net

volumes:
  drizatx_dev_mysql_data:
    name: drizatx_dev_mysql_data
