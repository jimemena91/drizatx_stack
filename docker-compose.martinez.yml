services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drizatx-martinez-backend
    restart: unless-stopped
    ports:
      - "3201:3001"

    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: "3001"
      COOKIE_DOMAIN: ".drizatx.com"

      # Conectamos al MySQL EXISTENTE (ya creado fuera de este compose)
      DATABASE_HOST: drizatx-martinez-mysql
      DATABASE_PORT: "3306"
      DATABASE_USERNAME: driza_martinez
      DATABASE_PASSWORD: DrizaMartinez_2025
      DATABASE_NAME: drizatx_martinez

      JWT_SECRET: "driza-super-secret-2025"

      # CORS: el front (3210) y el backend (3201) por si el browser lo necesita
      FRONTEND_URLS: "https://martinez.app.drizatx.com"
      # === IMPRESION CENTRALIZADA (VIA TUNEL SSH) ===
      PRINT_WEBHOOK_URL: "http://host.docker.internal:17080/print"
      PRINT_WEBHOOK_TOKEN: "mi_token_super_secreto_123"
      # === IMPRESION CENTRALIZADA (VIA TUNEL SSH) ===
    networks:
      - martinez-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL absoluta para next.config.mjs / rewrites
        BACKEND_URL: "http://backend:3001"

        # 0 = modo proxy por /api (misma origin) => evita 401 por cookies
        NEXT_PUBLIC_API_MODE: "1"

        # demo OFF (pero ojo: si tu Dockerfile no lo consume, lo agregamos en el paso siguiente)

        # quedan por compatibilidad; en API_MODE=0 el front usa /api
        NEXT_PUBLIC_API_URL: "https://martinez.api.drizatx.com"
        NEXT_PUBLIC_BASE_URL: "https://martinez.app.drizatx.com"

        NEXT_PUBLIC_SMS_ENABLED: "false"
        NEXT_PUBLIC_PUSH_ENABLED: "false"

    environment:
      # Next.js también lo necesita en runtime para next.config.mjs
      BACKEND_URL: "http://backend:3001"
      NEXT_PUBLIC_API_MODE: "1"
      NEXT_PUBLIC_API_URL: "https://martinez.api.drizatx.com"
      NEXT_PUBLIC_BASE_URL: "https://martinez.app.drizatx.com"
      NEXT_PUBLIC_SMS_ENABLED: "false"
      NEXT_PUBLIC_PUSH_ENABLED: "false"

    container_name: drizatx-martinez-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3210:3000"
    networks:
      - martinez-net

networks:
  martinez-net:
    external: true
    name: drizatx-martinez_drizatx-martinez-net
