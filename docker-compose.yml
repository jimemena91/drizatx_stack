services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drizatx-main-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_NAME: drizatx
      FRONTEND_URLS: "https://app.drizatx.com"
      JWT_SECRET: "driza-super-secret-2025"
    ports:
      - "3401:3001"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: "https://api.drizatx.com"
        NEXT_PUBLIC_API_MODE: "true"
        NEXT_PUBLIC_API_URL: "https://api.drizatx.com"
        NEXT_PUBLIC_API_BASE_URL: "https://api.drizatx.com"
        NEXT_PUBLIC_BASE_URL: "https://app.drizatx.com"
        NEXT_PUBLIC_PRINT_WEBHOOK_URL: ""
        NEXT_PUBLIC_PRINT_WEBHOOK_TOKEN: ""
        NEXT_PUBLIC_SMS_ENABLED: "false"
        NEXT_PUBLIC_PUSH_ENABLED: "false"
    container_name: drizatx-main-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      BACKEND_URL: "https://api.drizatx.com"
      NEXT_PUBLIC_API_MODE: "true"
      NEXT_PUBLIC_API_URL: "https://api.drizatx.com"
      NEXT_PUBLIC_API_BASE_URL: "https://api.drizatx.com"
      NEXT_PUBLIC_BASE_URL: "https://app.drizatx.com"
      NEXT_PUBLIC_PRINT_WEBHOOK_URL: ""
      NEXT_PUBLIC_PRINT_WEBHOOK_TOKEN: ""
      NEXT_PUBLIC_SMS_ENABLED: "false"
      NEXT_PUBLIC_PUSH_ENABLED: "false"
    ports:
      - "3410:3000"

  db:
    image: mysql:8
    container_name: drizatx-main-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: drizatx
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
