name: Deploy VPS

on:
  push:
    branches:
      - main
      - staging
      - martinez/prod
      - cruzverde/prod
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Preparar SSH
        shell: bash
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy remoto en VPS
        shell: bash
        run: |
          set -eu

          BRANCH="${{ github.ref_name }}"

          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -eu

            case '$BRANCH' in
              main)
                APP_DIR='/opt/drizatx_worktrees/main'
                COMPOSE_FILE='docker-compose.yml'
                ;;
              staging)
                APP_DIR='/opt/drizatx_worktrees/staging'
                COMPOSE_FILE='docker-compose.staging.yml'
                ;;
              martinez/prod)
                APP_DIR='/opt/drizatx_worktrees/martinez-prod'
                COMPOSE_FILE='docker-compose.martinez.yml'
                ;;
              cruzverde/prod)
                APP_DIR='/opt/drizatx_worktrees/cruzverde-prod'
                COMPOSE_FILE='docker-compose.cruzverde.yml'
                ;;
              *)
                echo 'Rama no soportada: $BRANCH'
                exit 1
                ;;
            esac

            cd \"\$APP_DIR\"
            git fetch origin
            git pull --ff-only origin \"$BRANCH\"
            docker compose -f \"\$COMPOSE_FILE\" up -d --build
            docker compose -f \"\$COMPOSE_FILE\" ps
          "
